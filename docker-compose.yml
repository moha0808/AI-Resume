version: '3.8'

services:
  # MongoDB
  mongodb:
    image: mongo:7
    container_name: ai-resume-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ai-resume

  # Node.js Backend
  server:
    build: ./server
    container_name: ai-resume-server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/ai-resume
      - JWT_SECRET=change_this_in_production
      - JWT_REFRESH_SECRET=change_this_refresh_in_production
      - CLIENT_URL=http://localhost:5173
      - AI_SERVICE_URL=http://ai-service:8000
    depends_on:
      - mongodb
    volumes:
      - ./server/uploads:/app/uploads

  # Python AI Service
  ai-service:
    build: ./ai-service
    container_name: ai-resume-ai
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - USE_MOCK=true
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}

  # React Frontend
  client:
    build: ./client
    container_name: ai-resume-client
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  mongo_data:
